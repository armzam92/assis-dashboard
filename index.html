<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --hero-bg:#2D2D2D; --hero-text:#FFF; --accent:#E8725C; --accent-light:#F4A59A;
  --positive:#27AE60; --negative:#E74C3C; --warning:#F39C12;
  --text:#333; --text-light:#777; --bg:#F5F6F8; --card-bg:#FFF; --border:#E8E8E8;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.container{max-width:1200px;margin:0 auto;padding:0 20px}

/* Hero */
.hero{background:var(--hero-bg);color:var(--hero-text);padding:32px 0 28px}
.hero-title{font-size:1.1rem;font-weight:400;opacity:.7;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
.hero-date{font-size:1.8rem;font-weight:700;margin-bottom:20px}

/* Filter bar */
.filter-bar{
  display:flex;gap:12px;align-items:center;flex-wrap:wrap;
  background:rgba(255,255,255,.08);border-radius:10px;padding:10px 16px;margin-bottom:20px;
}
.filter-bar button{
  background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.12);
  border-radius:6px;padding:6px 12px;font-size:.85rem;cursor:pointer;font-family:inherit;transition:all .15s;
}
.filter-bar button:hover{background:rgba(255,255,255,.18);color:#fff}
.filter-bar .nav-btn{font-size:1rem;padding:6px 10px;font-weight:700}
.filter-bar .date-display{font-size:1rem;font-weight:600;min-width:160px;text-align:center}
.filter-bar .separator{flex:1}
.filter-bar label{font-size:.8rem;display:flex;align-items:center;gap:6px;opacity:.7;cursor:pointer;transition:opacity .15s}
.filter-bar label:hover{opacity:1}
.filter-bar input[type=checkbox]{accent-color:var(--accent)}
.filter-bar select{
  background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.12);
  border-radius:6px;padding:6px 10px;font-size:.82rem;font-family:inherit;cursor:pointer;
  max-width:200px;
}
.filter-bar select option{background:#333;color:#fff}

/* Period toggle group */
.period-toggle{display:flex;background:rgba(0,0,0,.25);border-radius:8px;padding:3px;gap:2px}
.period-toggle button{
  background:transparent;color:rgba(255,255,255,.5);border:none;
  border-radius:6px;padding:6px 18px;font-size:.85rem;cursor:pointer;
  font-family:inherit;font-weight:500;transition:all .15s;white-space:nowrap;
}
.period-toggle button:hover{color:rgba(255,255,255,.8)}
.period-toggle button.active{background:var(--accent);color:#fff;font-weight:600}

/* Goal */
.goal-section{background:rgba(255,255,255,.08);border-radius:10px;padding:16px 20px;margin-bottom:20px}
.goal-label{font-size:.75rem;text-transform:uppercase;letter-spacing:1px;opacity:.6;margin-bottom:6px}
.goal-row{display:flex;align-items:center;gap:16px;margin-bottom:8px}
.goal-text{font-size:1.3rem;font-weight:700;white-space:nowrap}
.goal-text .accent{color:var(--accent)}
.progress-bar{flex:1;height:10px;background:rgba(255,255,255,.15);border-radius:5px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:5px;transition:width .3s}
.goal-pace{font-size:.85rem;opacity:.7}

/* KPI pills */
.kpi-pills{display:flex;gap:12px;flex-wrap:wrap}
.kpi-pill{background:rgba(255,255,255,.08);border-radius:8px;padding:10px 16px;flex:1;min-width:130px;text-align:center}
.kpi-pill-label{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;opacity:.5;margin-bottom:2px}
.kpi-pill-value{font-size:1.2rem;font-weight:700}

/* Sections */
.section{padding:28px 0}
.section-title{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-light);margin-bottom:16px;display:flex;align-items:center;gap:8px}

/* Cards */
.cards-row{display:flex;gap:16px;flex-wrap:wrap}
.highlight-card{flex:1;min-width:250px;background:var(--card-bg);border-radius:10px;padding:18px 20px;border-left:4px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.06)}
.highlight-card.green{border-left-color:var(--positive)}
.highlight-card.red{border-left-color:var(--negative)}
.highlight-card.orange{border-left-color:var(--warning)}
.highlight-card.accent{border-left-color:var(--accent)}
.card-label{font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-light);margin-bottom:4px}
.card-value{font-size:1.6rem;font-weight:700;margin-bottom:2px}
.card-detail{font-size:.85rem;color:var(--text-light)}

/* AI */
.ai-box{background:var(--card-bg);border-radius:10px;padding:20px 24px;box-shadow:0 1px 3px rgba(0,0,0,.06);border-left:4px solid var(--accent)}
.ai-action{background:#FFF3E0;border-radius:6px;padding:10px 14px;margin-top:10px;font-weight:600;font-size:.9rem;color:#E65100}

/* Funnel */
.funnel{display:flex;align-items:center;justify-content:center;gap:0;flex-wrap:wrap;background:var(--card-bg);border-radius:10px;padding:28px 20px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.funnel-step{text-align:center;padding:0 20px;min-width:120px}
.funnel-step-label{font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-light);margin-bottom:4px}
.funnel-step-value{font-size:2rem;font-weight:800;color:var(--text)}
.funnel-arrow{display:flex;flex-direction:column;align-items:center;padding:0 6px;color:var(--text-light)}
.funnel-arrow-line{font-size:1.2rem;line-height:1}
.funnel-arrow-rate{font-size:.7rem;font-weight:600;color:var(--accent);white-space:nowrap}

/* Tables */
.data-table{width:100%;border-collapse:collapse;background:var(--card-bg);border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.data-table th{background:#F8F8F8;font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-light);padding:10px 14px;text-align:left;font-weight:600;border-bottom:1px solid var(--border)}
.data-table td{padding:10px 14px;border-bottom:1px solid #F0F0F0;font-size:.9rem}
.data-table tr:last-child td{border-bottom:none}
.data-table .num{text-align:right;font-variant-numeric:tabular-nums}
.data-table .bold{font-weight:700}

/* Metrics grid */
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.metric-card{background:var(--card-bg);border-radius:10px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.metric-card-title{font-size:.75rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-light);margin-bottom:12px;font-weight:700}
.metric-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #F5F5F5;font-size:.9rem}
.metric-row:last-child{border-bottom:none}
.metric-label{color:var(--text-light)}
.metric-value{font-weight:600}

/* Colors */
.positive{color:var(--positive)}.negative{color:var(--negative)}.neutral{color:var(--text-light)}

/* Segment bars */
.seg-bar-wrap{margin-bottom:10px}
.seg-bar-label{display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:3px}
.seg-bar{height:6px;background:#EEE;border-radius:3px;overflow:hidden}
.seg-bar-fill{height:100%;background:var(--accent);border-radius:3px}

/* Comparison indicator */
.comp-badge{display:inline-block;font-size:.75rem;padding:2px 8px;border-radius:4px;margin-left:8px;font-weight:600}

/* Charts */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:768px){.charts-grid{grid-template-columns:1fr}}
.chart-card{background:var(--card-bg);border-radius:12px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.chart-card-title{font-size:.75rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-light);margin-bottom:4px;font-weight:700}
.chart-card-value{font-size:1.6rem;font-weight:700;margin-bottom:12px}
.chart-card-value .sub{font-size:.8rem;font-weight:500;color:var(--text-light);margin-left:6px}
.chart-svg{width:100%;height:120px;display:block}
.chart-labels{display:flex;justify-content:space-between;font-size:.65rem;color:var(--text-light);margin-top:4px;padding:0 2px}
.comp-badge.positive{background:#E8F5E9;color:var(--positive)}
.comp-badge.negative{background:#FFEBEE;color:var(--negative)}
.comp-badge.neutral{background:#F5F5F5;color:var(--text-light)}

/* Auth overlay */
#auth-overlay{position:fixed;inset:0;z-index:9999;background:var(--hero-bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px;color:#fff}
#auth-overlay.hidden{display:none}
.auth-box{text-align:center;max-width:400px;padding:40px}
.auth-logo{font-size:2.5rem;margin-bottom:8px}
.auth-title{font-size:1.5rem;font-weight:700;margin-bottom:4px}
.auth-sub{font-size:.9rem;opacity:.6;margin-bottom:24px}
.auth-error{color:var(--negative);font-size:.85rem;margin-top:12px;display:none}
.auth-user{font-size:.85rem;opacity:.6;margin-top:8px}
#auth-signout{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:6px;padding:6px 14px;font-size:.8rem;cursor:pointer;position:fixed;top:12px;right:12px;z-index:100;font-family:inherit}
#auth-signout:hover{background:rgba(255,255,255,.2)}

.footer{text-align:center;padding:24px 0;font-size:.75rem;color:var(--text-light)}

@media(max-width:768px){
  .kpi-pills{gap:8px}.kpi-pill{min-width:100px;padding:8px 10px}.kpi-pill-value{font-size:1rem}
  .cards-row{flex-direction:column}.highlight-card{min-width:auto}
  .funnel{flex-direction:column;gap:8px}.funnel-arrow{transform:rotate(90deg)}.funnel-step-value{font-size:1.5rem}
  .metrics-grid{grid-template-columns:1fr}.hero-date{font-size:1.4rem}
  .filter-bar{gap:8px}.filter-bar .date-display{min-width:auto}
}
</style>
</head>

<script>
// ─── Auth ───
const GOOGLE_CLIENT_ID = "912613119441-l1csst08b3kq11amg2t4t2q2d6u7tmcc.apps.googleusercontent.com";
const ALLOWED_DOMAIN = "assis.co";

function decodeJwt(token) {
  const payload = token.split('.')[1];
  return JSON.parse(atob(payload.replace(/-/g,'+').replace(/_/g,'/')));
}

function handleAuth(response) {
  try {
    const user = decodeJwt(response.credential);
    const email = user.email || '';
    const domain = email.split('@')[1] || '';
    if(domain !== ALLOWED_DOMAIN) {
      const err = document.getElementById('auth-error');
      err.textContent = 'Acesso restrito a @' + ALLOWED_DOMAIN + '. Voc\u00ea logou com ' + email;
      err.style.display = 'block';
      return;
    }
    sessionStorage.setItem('dash_user', JSON.stringify({email: user.email, name: user.name, picture: user.picture, exp: user.exp}));
    showDashboard(user);
  } catch(e) {
    console.error('Auth error:', e);
  }
}

function showDashboard(user) {
  document.getElementById('auth-overlay').classList.add('hidden');
  const btn = document.getElementById('auth-signout');
  btn.style.display = 'block';
  btn.textContent = (user.name || user.email) + ' \u00b7 Sair';
}

function signOut() {
  sessionStorage.removeItem('dash_user');
  document.getElementById('auth-overlay').classList.remove('hidden');
  document.getElementById('auth-signout').style.display = 'none';
  google.accounts.id.disableAutoSelect();
  location.reload();
}

// Check existing session
(function() {
  if(!GOOGLE_CLIENT_ID) {
    // No auth configured — show dashboard directly
    document.getElementById('auth-overlay').classList.add('hidden');
    return;
  }
  const stored = sessionStorage.getItem('dash_user');
  if(stored) {
    try {
      const user = JSON.parse(stored);
      if(user.exp && user.exp * 1000 > Date.now()) {
        showDashboard(user);
        return;
      }
    } catch(e) {}
    sessionStorage.removeItem('dash_user');
  }
})();

// ─── Helpers ───
function fm(v) {
  if(!v || v===0) return 'R$0';
  return 'R$'+v.toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');
}
function fp(v) { return (v||0).toFixed(1)+'%'; }
function num(v) { return (v||0).toLocaleString('pt-BR'); }

function delta(cur,prev) {
  if(!prev) return ['—','neutral'];
  const pct=((cur-prev)/prev)*100;
  if(Math.abs(pct)<1) return ['=','neutral'];
  const txt=(pct>0?'+':'')+pct.toFixed(0)+'%';
  return [txt, pct>0?'positive':'negative'];
}
function deltaInv(cur,prev) {
  const [t,c]=delta(cur,prev);
  if(c==='positive') return [t,'negative'];
  if(c==='negative') return [t,'positive'];
  return [t,c];
}

function parseDate(s) { const p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }
function fmtDate(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtDateBR(d) { return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear(); }

const WEEKDAYS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sab'];
function fmtDayShort(d) { return WEEKDAYS[d.getDay()]+' '+String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0'); }

// ─── Period logic ───
function getWeekStart(d) { const dt=new Date(d); const day=dt.getDay(); const diff=dt.getDate()-day+(day===0?-6:1); dt.setDate(diff); return dt; }
function getMonthStart(d) { return new Date(d.getFullYear(),d.getMonth(),1); }
function getMonthEnd(d) { return new Date(d.getFullYear(),d.getMonth()+1,0); }

function getPeriodDates(period, dateStr) {
  const d = parseDate(dateStr);
  if(period==='dia') return [dateStr];
  if(period==='semana') {
    const ws = getWeekStart(d);
    const dates = [];
    for(let i=0;i<7;i++) {
      const dd=new Date(ws); dd.setDate(ws.getDate()+i);
      const key=fmtDate(dd);
      if(DAYS[key]) dates.push(key);
    }
    return dates;
  }
  if(period==='mes') {
    const ms=getMonthStart(d), me=getMonthEnd(d);
    const dates=[];
    for(let dd=new Date(ms); dd<=me; dd.setDate(dd.getDate()+1)) {
      const key=fmtDate(dd);
      if(DAYS[key]) dates.push(key);
    }
    return dates;
  }
  return [dateStr];
}

function getPrevPeriodDates(period, dateStr) {
  const d = parseDate(dateStr);
  if(period==='dia') {
    const pd=new Date(d); pd.setDate(pd.getDate()-7); // same weekday last week
    return [fmtDate(pd)];
  }
  if(period==='semana') {
    const ws=getWeekStart(d);
    const pws=new Date(ws); pws.setDate(pws.getDate()-7);
    const dates=[];
    for(let i=0;i<7;i++) {
      const dd=new Date(pws); dd.setDate(pws.getDate()+i);
      const key=fmtDate(dd);
      if(DAYS[key]) dates.push(key);
    }
    return dates;
  }
  if(period==='mes') {
    const pm=new Date(d.getFullYear(),d.getMonth()-1,1);
    const pme=new Date(d.getFullYear(),d.getMonth(),0);
    const dates=[];
    for(let dd=new Date(pm); dd<=pme; dd.setDate(dd.getDate()+1)) {
      const key=fmtDate(dd);
      if(DAYS[key]) dates.push(key);
    }
    return dates;
  }
  return [];
}

function aggregate(dates, campaignFilter) {
  if(!dates.length) return null;
  const filterCampaign = campaignFilter && campaignFilter !== 'all';
  const r = {
    days:0, visitors:0, leads:0, mql:0, pagantes:0, spend:0, impressions:0, clicks:0,
    new_subs:0, new_subs_fresh:0, new_subs_resurrected:0, new_mrr:0, new_mrr_fresh:0, new_mrr_resurrected:0,
    revenue:0, churned:0, churn_vol:0, churn_inv:0,
    total_mrr:0, active_subs:0, subs_by_product:{}, churn_by_product:{},
    new_subs_by_product:{}, pending:0, pending_by_product:{}, segments:{},
    campaigns_agg:{}
  };
  let last = null;
  for(const dt of dates.sort()) {
    const d = DAYS[dt];
    if(!d) continue;
    r.days++;

    if(filterCampaign) {
      const camp = (d.campaigns||[]).find(c => (c.key||c.name) === campaignFilter);
      if(camp) {
        r.leads += camp.leads||0;
        r.mql += camp.mql||0;
        r.pagantes += camp.pagantes||0;
        r.spend += camp.spend||0;
      }
      r.visitors += d.visitors||0;
    } else {
      r.visitors += d.visitors||0;
      r.leads += d.leads||0;
      r.mql += d.mql||0;
      r.pagantes += d.pagantes||0;
      r.spend += d.spend||0;
    }

    r.impressions += d.impressions||0;
    r.clicks += d.clicks||0;
    const s = d.stripe||{};
    // Stripe metrics are global (not attributable to campaigns)
    if(!filterCampaign) {
      r.new_subs += s.new_subs||0;
      r.new_subs_fresh += s.new_subs_fresh||0;
      r.new_subs_resurrected += s.new_subs_resurrected||0;
      r.new_mrr += s.new_mrr||0;
      r.new_mrr_fresh += s.new_mrr_fresh||0;
      r.new_mrr_resurrected += s.new_mrr_resurrected||0;
      r.revenue += s.revenue||0;
      r.churned += s.churned||0;
      r.churn_vol += s.churn_voluntary||0;
      r.churn_inv += s.churn_involuntary||0;
    }
    last = d;

    // Aggregate churn per product across days (only when not filtering campaigns)
    if(!filterCampaign) {
      const dayChurn = s.churn_by_product||{};
      for(const [prod, ch] of Object.entries(dayChurn)) {
        if(!r.churn_by_product[prod]) r.churn_by_product[prod] = {total:0,voluntary:0,involuntary:0};
        r.churn_by_product[prod].total += ch.total||0;
        r.churn_by_product[prod].voluntary += ch.voluntary||0;
        r.churn_by_product[prod].involuntary += ch.involuntary||0;
      }
      const dayNew = s.new_subs_by_product||{};
      for(const [prod, np] of Object.entries(dayNew)) {
        if(!r.new_subs_by_product[prod]) r.new_subs_by_product[prod] = {count:0};
        const c = typeof np === 'object' ? (np.count||0) : 0;
        r.new_subs_by_product[prod].count += c;
      }
    }

    // Merge segments
    const segs = d.top_segments || {};
    for(const[k,v] of Object.entries(segs)) r.segments[k] = (r.segments[k]||0)+v;
    // Aggregate campaigns across days (keyed by utm_campaign)
    for(const c of (d.campaigns||[])) {
      const ck = c.key||c.name;
      if(!r.campaigns_agg[ck]) r.campaigns_agg[ck] = {display:c.name, leads:0,mql:0,pagantes:0,spend:0};
      r.campaigns_agg[ck].leads += c.leads||0;
      r.campaigns_agg[ck].mql += c.mql||0;
      r.campaigns_agg[ck].pagantes += c.pagantes||0;
      r.campaigns_agg[ck].spend += c.spend||0;
    }
  }
  if(last) {
    const s = last.stripe||{};
    r.total_mrr = s.total_mrr||0;
    r.active_subs = s.active_subs||0;
    r.subs_by_product = s.subs_by_product||{};
    r.pending = s.pending_cancellations||0;
    r.pending_by_product = s.pending_by_product||{};
  }
  // No matching data found
  if(r.days === 0) return null;
  // Computed
  r.cpl = r.leads>0 ? r.spend/r.leads : 0;
  r.cac = r.pagantes>0 ? r.spend/r.pagantes : 0;
  r.cac_real = r.new_subs>0 ? r.spend/r.new_subs : 0;
  r.cac_aquisicao = r.new_subs_fresh>0 ? r.spend/r.new_subs_fresh : 0;
  r.taxa_lead = r.visitors>0 ? r.leads/r.visitors*100 : 0;
  r.taxa_mql = r.leads>0 ? r.mql/r.leads*100 : 0;
  r.taxa_conv = r.mql>0 ? (r.new_subs||r.pagantes)/r.mql*100 : 0;
  r.lead_pago = r.leads>0 ? (r.new_subs||r.pagantes)/r.leads*100 : 0;
  r.ticket = r.new_subs>0 ? r.new_mrr/r.new_subs : 0;
  r.churn_rate = r.active_subs>0 ? r.churned/r.active_subs*100 : 0;
  r.churn_total = r.churned + r.pending;
  r.churn_total_rate = r.active_subs>0 ? r.churn_total/r.active_subs*100 : 0;
  return r;
}

function navigate(dir) {
  if(state.period==='dia') {
    // Snap to next/prev available date
    const idx = sortedDates.indexOf(state.date);
    if(dir>0 && idx<sortedDates.length-1) state.date = sortedDates[idx+1];
    else if(dir<0 && idx>0) state.date = sortedDates[idx-1];
    else if(idx===-1) {
      // Current date not in data — find nearest
      const nearest = dir>0
        ? sortedDates.find(d => d > state.date)
        : [...sortedDates].reverse().find(d => d < state.date);
      if(nearest) state.date = nearest;
    }
  } else if(state.period==='semana') {
    const d = parseDate(state.date);
    d.setDate(d.getDate()+(dir*7));
    state.date = fmtDate(d);
  } else {
    const d = parseDate(state.date);
    d.setMonth(d.getMonth()+dir);
    state.date = fmtDate(d);
  }
  renderAll();
}

function getDateLabel() {
  const d = parseDate(state.date);
  if(state.period==='dia') return fmtDayShort(d)+' '+d.getFullYear();
  if(state.period==='semana') {
    const ws=getWeekStart(d);
    const we=new Date(ws); we.setDate(we.getDate()+6);
    return fmtDateBR(ws)+' - '+fmtDateBR(we);
  }
  const months=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return months[d.getMonth()]+' '+d.getFullYear();
}

        </div>
        <div style="flex:1;min-width:140px;background:rgba(255,255,255,.06);border-radius:8px;padding:10px 14px">
          <div style="font-size:.65rem;text-transform:uppercase;letter-spacing:1px;opacity:.5;margin-bottom:2px">M\u00e9dia/dia</div>
          <div style="font-size:1.1rem;font-weight:700;color:${pacePerDay>=parseFloat(dailyGoal)?'var(--positive)':'var(--negative)'}">${pacePerDay.toFixed(1)}</div>
          <div style="font-size:.75rem;opacity:.6">meta ${dailyGoal}/dia</div>
        </div>
      </div>
    </div>`;
  } else if(isWeek) {
    const paceWeek = (pacePerDay * 7).toFixed(1);
    const dailyGoal = (WEEKLY_GOAL / 7).toFixed(1);
    const daysLeft = 7 - days;
    const remaining = Math.max(goal - sales, 0);
    const needPerDay = daysLeft > 0 ? (remaining / daysLeft).toFixed(1) : '0';
    const onTrack = parseFloat(paceWeek) >= WEEKLY_GOAL;
    const paceColor = onTrack ? 'var(--positive)' : 'var(--negative)';
    const statusIcon = onTrack ? '\u2705' : '\u26A0\uFE0F';

    goalHtml = `
    <div class="goal-section">
      <div class="goal-label">${goalLabel} ${statusIcon}</div>
      <div class="goal-row">
        <div class="goal-text"><span class="accent">${sales}</span>/${goal} vendas${resLabel}</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct.toFixed(0)}%"></div></div>
      </div>
      <div class="goal-pace" style="color:${paceColor}">PACE: ${paceWeek} vendas/sem (${days}d) \u00b7 Faltam ${remaining} em ${daysLeft}d (${needPerDay}/dia)</div>
      <div style="display:flex;gap:16px;margin-top:12px">
        <div style="flex:1;background:rgba(255,255,255,.06);border-radius:8px;padding:10px 14px">
          <div style="font-size:.65rem;text-transform:uppercase;letter-spacing:1px;opacity:.5;margin-bottom:2px">M\u00e9dia/dia</div>
          <div style="font-size:1.1rem;font-weight:700;color:${pacePerDay>=parseFloat(dailyGoal)?'var(--positive)':'var(--negative)'}">${pacePerDay.toFixed(1)}</div>
          <div style="font-size:.75rem;opacity:.6">meta ${dailyGoal}/dia</div>
        </div>
      </div>
    </div>`;
  } else {
    goalHtml = `
    <div class="goal-section">
      <div class="goal-label">Vendas do dia</div>
      <div class="goal-row">
        <div class="goal-text"><span class="accent">${sales}</span> vendas</div>
      </div>
    </div>`;
  }

  // MRR growth (month view)
  let mrrHtml = '';
  if(isMonth) {
    const monthPrefix = state.date.slice(0,7);
    const monthDates = sortedDates.filter(d=>d.startsWith(monthPrefix)).sort();
    const firstDay = monthDates[0];
    const lastDay = monthDates[monthDates.length-1];
    const baseMrr = firstDay && DAYS[firstDay]?.stripe?.total_mrr ? DAYS[firstDay].stripe.total_mrr : 0;
    const curMrr = lastDay && DAYS[lastDay]?.stripe?.total_mrr ? DAYS[lastDay].stripe.total_mrr : 0;
    if(baseMrr > 0) {
      const daysInMonth = new Date(parseInt(state.date.slice(0,4)), parseInt(state.date.slice(5,7)), 0).getDate();
      const targetMrr = baseMrr * (1 + MRR_GROWTH_TARGET/100);
      const netGrowth = curMrr - baseMrr;
      const targetGrowth = targetMrr - baseMrr;
      const growthPct = (netGrowth/baseMrr*100);
      const mrrPct = Math.min(Math.max(netGrowth/targetGrowth*100, 0), 100);
      const mrrColor = growthPct >= MRR_GROWTH_TARGET ? 'var(--positive)' : growthPct >= MRR_GROWTH_TARGET*0.5 ? 'var(--accent)' : 'var(--negative)';
      // MRR pace
      const mrrPerDay = days > 0 ? netGrowth / days : 0;
      const projectedGrowth = mrrPerDay * daysInMonth;
      const projectedPct = (projectedGrowth / baseMrr * 100).toFixed(1);
      const projectedMrr = baseMrr + projectedGrowth;
      const mrrOnTrack = projectedGrowth >= targetGrowth;
      const mrrNeedPerDay = (daysInMonth - days) > 0 ? ((targetGrowth - netGrowth) / (daysInMonth - days)) : 0;
      mrrHtml = `
      <div class="goal-section" style="margin-top:12px">
        <div class="goal-label">MRR L\u00edquido (meta ${MRR_GROWTH_TARGET}% MoM) ${mrrOnTrack?'\u2705':'\u26A0\uFE0F'}</div>
        <div class="goal-row">
          <div class="goal-text"><span style="color:${mrrColor}">${netGrowth>=0?'+':''}${fm(netGrowth)}</span> <span style="font-size:.85rem;opacity:.6">/ ${fm(targetGrowth)}</span></div>
          <div class="progress-bar"><div class="progress-fill" style="width:${mrrPct.toFixed(0)}%;background:${mrrColor}"></div></div>
        </div>
        <div class="goal-pace">${fm(baseMrr)} \u2192 ${fm(curMrr)} (${growthPct>=0?'+':''}${growthPct.toFixed(1)}%) \u00b7 Meta: ${fm(targetMrr)}</div>
        <div style="display:flex;gap:16px;margin-top:12px;flex-wrap:wrap">
          <div style="flex:1;min-width:140px;background:rgba(255,255,255,.06);border-radius:8px;padding:10px 14px">
            <div style="font-size:.65rem;text-transform:uppercase;letter-spacing:1px;opacity:.5;margin-bottom:2px">Pace MRR</div>
            <div style="font-size:1.1rem;font-weight:700;color:${mrrOnTrack?'var(--positive)':'var(--negative)'}">${fm(projectedMrr)}</div>
            <div style="font-size:.75rem;opacity:.6">projetado +${projectedPct}%</div>
          </div>
          <div style="flex:1;min-width:140px;background:rgba(255,255,255,.06);border-radius:8px;padding:10px 14px">
            <div style="font-size:.65rem;text-transform:uppercase;letter-spacing:1px;opacity:.5;margin-bottom:2px">Crescimento/dia</div>
            <div style="font-size:1.1rem;font-weight:700">${fm(mrrPerDay)}</div>
            <div style="font-size:.75rem;opacity:.6">precisa ${fm(mrrNeedPerDay)}/dia</div>
          </div>
        </div>
      </div>`;
    }
  }

  document.getElementById('goal-section').innerHTML = goalHtml + mrrHtml;

  // KPI pills
  const pills = [
    ['CAC Real', fm(data.cac_real)],
    ['Lead &rarr; Pago', fp(data.lead_pago)],
    ['Investido', fm(data.spend)],
    ['Leads', num(data.leads)],
    ['Visitantes', num(data.visitors)],
  ];
  document.getElementById('kpi-pills').innerHTML = '<div class="kpi-pills">'+pills.map(([l,v])=>
    `<div class="kpi-pill"><div class="kpi-pill-label">${l}</div><div class="kpi-pill-value">${v}</div></div>`
  ).join('')+'</div>';
}

function badge(cur,prev,inv) {
  if(!prev) return '';
  const [t,c] = inv ? deltaInv(cur,prev) : delta(cur,prev);
  return `<span class="comp-badge ${c}">${t}</span>`;
}

}

function renderCharts(dates) {
  if(dates.length < 2) { document.getElementById('charts-section').innerHTML=''; return; }
  const sorted = dates.filter(d=>DAYS[d]).sort();
  if(sorted.length < 2) { document.getElementById('charts-section').innerHTML=''; return; }

  function sparkline(values, color, fillColor) {
    const W=320, H=100, padY=8, padX=2;
    const max = Math.max(...values, 1);
    const min = Math.min(...values, 0);
    const range = max - min || 1;
    const pts = values.map((v,i) => {
      const x = padX + (i/(values.length-1))*(W-2*padX);
      const y = padY + (1 - (v-min)/range)*(H-2*padY);
      return [x.toFixed(1),y.toFixed(1)];
    });
    const line = pts.map(([x,y],i) => (i===0?'M':'L')+x+','+y).join(' ');
    const area = line + ` L${W-padX},${H} L${padX},${H} Z`;
    // Dots for first, last, and max
    const maxIdx = values.indexOf(Math.max(...values));
    const dots = [0, values.length-1, maxIdx].map(i =>
      `<circle cx="${pts[i][0]}" cy="${pts[i][1]}" r="3" fill="${color}" />`
    ).join('');
    return `<svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <defs><linearGradient id="g_${color.replace('#','')}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${fillColor}" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="${fillColor}" stop-opacity="0.02"/>
      </linearGradient></defs>
      <path d="${area}" fill="url(#g_${color.replace('#','')})" />
      <path d="${line}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
      ${dots}
    </svg>`;
  }

  function chartCard(title, values, total, color, fillColor, suffix) {
    const svg = sparkline(values, color, fillColor);
    const labels = sorted.map(d => d.slice(8));
    const first = labels[0];
    const last = labels[labels.length-1];
    const mid = labels.length>4 ? labels[Math.floor(labels.length/2)] : '';
    // Trend calc
    const half = Math.floor(values.length/2);
    const firstHalf = values.slice(0,half).reduce((a,b)=>a+b,0)/(half||1);
    const secondHalf = values.slice(half).reduce((a,b)=>a+b,0)/((values.length-half)||1);
    const trend = firstHalf>0 ? ((secondHalf-firstHalf)/firstHalf*100) : 0;
    const trendStr = trend>=0 ? `<span class="positive">\u25B2 ${Math.abs(trend).toFixed(0)}%</span>` : `<span class="negative">\u25BC ${Math.abs(trend).toFixed(0)}%</span>`;

    return `<div class="chart-card">
      <div class="chart-card-title">${title}</div>
      <div class="chart-card-value">${typeof total==='string'?total:num(total)} <span class="sub">${suffix||''} ${trendStr}</span></div>
      ${svg}
      <div class="chart-labels"><span>${first}</span>${mid?'<span>'+mid+'</span>':''}<span>${last}</span></div>
    </div>`;
  }

  const leads = sorted.map(d => DAYS[d].leads);
  const mql = sorted.map(d => DAYS[d].mql);
  const vendas = sorted.map(d => (DAYS[d].stripe?.new_subs||DAYS[d].pagantes||0));
  const visitors = sorted.map(d => DAYS[d].visitors);
  const churn = sorted.map(d => (DAYS[d].stripe?.churned||0));
  const spend = sorted.map(d => DAYS[d].spend);
  const cpl = sorted.map(d => DAYS[d].leads>0 ? DAYS[d].spend/DAYS[d].leads : 0);
  const convRate = sorted.map(d => DAYS[d].mql>0 ? (DAYS[d].stripe?.new_subs||DAYS[d].pagantes||0)/DAYS[d].mql*100 : 0);

  const tLeads = leads.reduce((a,b)=>a+b,0);
  const tMql = mql.reduce((a,b)=>a+b,0);
  const tVendas = vendas.reduce((a,b)=>a+b,0);
  const tVis = visitors.reduce((a,b)=>a+b,0);
  const tChurn = churn.reduce((a,b)=>a+b,0);
  const tSpend = spend.reduce((a,b)=>a+b,0);
  const avgCpl = tLeads>0 ? tSpend/tLeads : 0;
  const avgConv = tMql>0 ? tVendas/tMql*100 : 0;

  document.getElementById('charts-section').innerHTML = `
    <div class="section"><div class="container">
      <div class="section-title">\uD83D\uDCC8 Tend\u00eancias</div>
      <div class="charts-grid">
        ${chartCard('Visitantes', visitors, tVis, '#6C63FF', '#6C63FF', 'total')}
        ${chartCard('Leads', leads, tLeads, '#E8725C', '#E8725C', 'total')}
        ${chartCard('MQL', mql, tMql, '#F39C12', '#F39C12', 'total')}
        ${chartCard('Vendas', vendas, tVendas, '#27AE60', '#27AE60', 'total')}
        ${chartCard('Churn', churn, tChurn, '#E74C3C', '#E74C3C', 'total')}
        ${chartCard('CPL', cpl, fm(avgCpl), '#9B59B6', '#9B59B6', 'm\u00e9dia')}
        ${chartCard('Investimento', spend, fm(tSpend), '#3498DB', '#3498DB', 'total')}
        ${chartCard('Conv. MQL\u2192Venda', convRate, fp(avgConv), '#1ABC9C', '#1ABC9C', 'm\u00e9dia')}
      </div>
    </div></div>`;
}

function renderStripe(data) {
  // Hide Stripe when filtering by campaign (not attributable)
  if(state.campaign !== 'all') { document.getElementById('stripe-section').innerHTML=''; return; }
  const subs = data.subs_by_product||{};
  const hasData = Object.keys(subs).length || Object.keys(data.churn_by_product||{}).length || Object.keys(data.new_subs_by_product||{}).length;
  if(!hasData) { document.getElementById('stripe-section').innerHTML=''; return; }
  const churn = data.churn_by_product||{};
  const newByProd = data.new_subs_by_product||{};
  const pendingByProd = data.pending_by_product||{};

  // Merge all known products: active subs + any with churn/new during period
  const allProds = new Set([...Object.keys(subs), ...Object.keys(churn), ...Object.keys(newByProd)]);
  const prodList = [...allProds].sort((a,b) => (subs[b]||0) - (subs[a]||0));

  let rows = '';
  let sumChT=0, sumChV=0, sumChI=0, sumNew=0, sumPend=0, totActive=0;
  for(const prod of prodList) {
    const active = subs[prod]||0;
    totActive += active;
    const ch = churn[prod]||{};
    const chT = ch.total||0;
    const chV = ch.voluntary||0;
    const chI = ch.involuntary||0;
    sumChT+=chT; sumChV+=chV; sumChI+=chI;
    const np = newByProd[prod]||{};
    const newCount = typeof np === 'object' ? (np.count||0) : 0;
    const freshCount = typeof np === 'object' ? (np.fresh||0) : 0;
    const resCount = typeof np === 'object' ? (np.resurrected||0) : 0;
    sumNew+=newCount;
    const pend = pendingByProd[prod]||0;
    sumPend+=pend;
    // Churn total = efetivado + agendado
    const churnTotal = chT + pend;
    const chRate = active>0 ? (churnTotal/active*100).toFixed(1) : '0.0';
    const newDetail = resCount>0 ? `<span style="font-size:.75rem;color:var(--text-light);display:block">${freshCount} novos · ${resCount} ressuscitados</span>` : '';

    rows += `<tr>
      <td class="bold">${prod}</td>
      <td class="num">${active}</td>
      <td class="num" style="color:var(--positive)">+${newCount}${newDetail}</td>
      <td class="num">
        <span style="color:var(--negative)">-${chT}</span>
        <span style="font-size:.75rem;color:var(--text-light);display:block">${chV} vol · ${chI} pgto</span>
      </td>
      <td class="num">${pend>0?'<span style="color:var(--warning)">\uD83D\uDD14 '+pend+'</span>':'—'}</td>
      <td class="num"><span style="color:var(--negative);font-weight:700">-${churnTotal}</span>
        <span style="font-size:.75rem;color:var(--text-light);display:block">${chRate}%</span></td>
    </tr>`;
  }
  const totalChurnAll = sumChT + sumPend;
  const totRate = totActive>0 ? (totalChurnAll/totActive*100).toFixed(1) : '0.0';
  rows += `<tr style="background:#F8F8F8;font-weight:700">
    <td>TOTAL</td>
    <td class="num">${totActive}</td>
    <td class="num" style="color:var(--positive)">+${sumNew}</td>
    <td class="num"><span style="color:var(--negative)">-${sumChT}</span>
      <span style="font-size:.75rem;color:var(--text-light);display:block">${sumChV} vol · ${sumChI} pgto</span></td>
    <td class="num">${sumPend>0?'<span style="color:var(--warning)">\uD83D\uDD14 '+sumPend+'</span>':'—'}</td>
    <td class="num"><span style="color:var(--negative);font-weight:700">-${totalChurnAll}</span>
      <span style="font-size:.75rem;color:var(--text-light);display:block">${totRate}%</span></td>
  </tr>`;

  document.getElementById('stripe-section').innerHTML = `
    <div class="section"><div class="container">
      <div class="section-title">\uD83D\uDCB3 Stripe — Por Produto</div>
      <table class="data-table"><thead><tr>
        <th>Produto</th><th class="num">Ativas</th><th class="num">Novas</th>
        <th class="num">Churn</th><th class="num">Agendado</th><th class="num">Total</th>
      </tr></thead><tbody>${rows}</tbody></table>
    </div></div>`;
}

function renderSegments(data) {
  const segs = data.segments;
  if(!segs || !Object.keys(segs).length) { document.getElementById('segments-section').innerHTML=''; return; }
  const sorted = Object.entries(segs).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const max = sorted[0]?.[1]||1;
  const bars = sorted.map(([name,mql])=> {
    const pct = (mql/max*100).toFixed(0);
    return `<div class="seg-bar-wrap">
      <div class="seg-bar-label"><span>${name}</span><span><b>${mql}</b> MQL</span></div>
      <div class="seg-bar"><div class="seg-bar-fill" style="width:${pct}%"></div></div></div>`;
  }).join('');

  document.getElementById('segments-section').innerHTML = `
    <div class="section"><div class="container">
      <div class="section-title">\uD83C\uDFF7\uFE0F Top Segmentos</div>
      ${bars}
    </div></div>`;
}

function renderEconomics(data, comp) {
  function row(label, val, compVal, inv) {
    let b = '';
    if(comp && compVal) b = badge(val, compVal, inv);
    return `<div class="metric-row"><span class="metric-label">${label}</span><span class="metric-value">${fm(val)}${b}</span></div>`;
  }
  function rowPct(label, val, compVal) {
    let b = '';
    if(comp && compVal) b = badge(val, compVal, false);
    return `<div class="metric-row"><span class="metric-label">${label}</span><span class="metric-value">${fp(val)}${b}</span></div>`;
  }

  const rows = [
    row('CPL', data.cpl, comp?.cpl, true),
    row('CAC (todos)', data.cac, comp?.cac, true),
  ];
  if(data.new_subs_resurrected > 0) {
    rows.push(row('CAC Aquisi\u00e7\u00e3o (s\u00f3 novos)', data.cac_aquisicao, comp?.cac_aquisicao, true));
  }
  rows.push(
    row('Ticket Medio', data.ticket, comp?.ticket, false),
    row('Investimento', data.spend, comp?.spend, false),
    rowPct('Lead &rarr; Pago', data.lead_pago, comp?.lead_pago),
  );
  const html = rows.join('');

  document.getElementById('economics-section').innerHTML = `
    <div class="section"><div class="container">
      <div class="section-title">\uD83D\uDCB0 Unit Economics</div>
      <div class="metric-card">${html}</div>
    </div></div>`;
}

// ─── Navigation bounds ───
function updateNavButtons() {
  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');
  if(state.period==='dia') {
    const idx = sortedDates.indexOf(state.date);
    btnPrev.disabled = idx <= 0;
    btnNext.disabled = idx >= sortedDates.length - 1;
  } else {
    btnPrev.disabled = false;
    btnNext.disabled = false;
  }
  btnPrev.style.opacity = btnPrev.disabled ? '0.3' : '1';
  btnNext.style.opacity = btnNext.disabled ? '0.3' : '1';
  btnPrev.style.cursor = btnPrev.disabled ? 'default' : 'pointer';
  btnNext.style.cursor = btnNext.disabled ? 'default' : 'pointer';
}

// ─── No data state ───
function renderEmpty() {
  const label = getDateLabel();
  document.getElementById('hero-date').textContent = label;
  document.getElementById('date-display').textContent = label;
  const emptyMsg = `<div class="section"><div class="container" style="text-align:center;padding:60px 20px">
    <div style="font-size:2.5rem;margin-bottom:12px">📭</div>
    <div style="font-size:1.1rem;font-weight:600;margin-bottom:6px">Sem dados para este per\u00edodo</div>
    <div style="color:var(--text-light);font-size:.9rem">Dados dispon\u00edveis: ${sortedDates[0]} a ${sortedDates[sortedDates.length-1]}</div>
  </div></div>`;
  ['cards-section','ai-section','funnel-section','charts-section','table-section','campaigns-section','period-metrics','stripe-section','segments-section','economics-section'].forEach(id => document.getElementById(id).innerHTML='');
  document.getElementById('cards-section').innerHTML = emptyMsg;
  document.getElementById('goal-section').innerHTML = '';
  document.getElementById('kpi-pills').innerHTML = '';
}

// ─── Main render ───
function renderCampaigns(data) {
  const camps = data.campaigns_agg;
  if(!camps || !Object.keys(camps).length) { document.getElementById('campaigns-section').innerHTML=''; return; }
  const sorted = Object.entries(camps).sort((a,b) => b[1].leads - a[1].leads);
  let rows = '';
  for(const [name, c] of sorted) {
    const cpl = c.leads>0 ? c.spend/c.leads : 0;
    const mqlRate = c.leads>0 ? c.mql/c.leads*100 : 0;
    const active = state.campaign === name;
    const label = c.display || name;
    rows += `<tr style="${active?'background:#FFF3E0':''};cursor:pointer" onclick="document.getElementById('campaign-filter').value='${name}';state.campaign='${name}';renderAll()">
      <td class="bold">${label.length>30?label.slice(0,27)+'...':label}</td>
      <td class="num">${c.leads}</td>
      <td class="num">${c.mql} <span style="font-size:.75rem;color:var(--text-light)">(${fp(mqlRate)})</span></td>
      <td class="num bold">${c.pagantes}</td>
      <td class="num">${fm(c.spend)}</td>
      <td class="num">${fm(cpl)}</td>
    </tr>`;
  }
  document.getElementById('campaigns-section').innerHTML = `
    <div class="section"><div class="container">
      <div class="section-title">\uD83C\uDFAF Campanhas ${state.campaign!=='all'?'<span style="color:var(--accent);font-size:.75rem">(filtrando: '+(allCampaigns.get(state.campaign)||state.campaign)+')</span>':''}</div>
      <table class="data-table"><thead><tr>
        <th>Campanha</th><th class="num">Leads</th><th class="num">MQL</th>
        <th class="num">Vendas</th><th class="num">Spend</th><th class="num">CPL</th>
      </tr></thead><tbody>${rows}</tbody></table>
      <div style="margin-top:8px;font-size:.8rem;color:var(--text-light)">Clique em uma campanha para filtrar o dashboard</div>
    </div></div>`;
}

function renderAll() {
  const dates = getPeriodDates(state.period, state.date);
  const data = aggregate(dates, state.campaign);

  updateNavButtons();

  let comp = null;
  if(state.compare) {
    const compDates = getPrevPeriodDates(state.period, state.date);
    comp = aggregate(compDates, state.campaign);
  }

  if(!data) {
    renderEmpty();
    return;
  }

  // Use live segments if viewing current date
  if(dates.includes(INITIAL_DATE) && CURRENT.segments && Object.keys(CURRENT.segments).length) {
    data.segments = {};
    for(const[k,v] of Object.entries(CURRENT.segments)) data.segments[k] = v.mql||0;
  }

  document.getElementById('date-display').textContent = getDateLabel();

  renderHero(data, comp);
  renderCards(data, comp);
  renderAI();
  renderFunnel(data, comp);
  renderCharts(dates);
  renderTable(dates);
  renderCampaigns(data);
  renderPeriodMetrics(data, comp);
  renderStripe(data);
  renderSegments(data);
  renderEconomics(data, comp);
}

// ─── Events ───
document.getElementById('period-toggle').addEventListener('click', e => {
  const btn = e.target.closest('[data-period]');
  if(!btn) return;
  document.querySelectorAll('#period-toggle button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.period = btn.dataset.period;
  renderAll();
});
document.getElementById('btn-prev').addEventListener('click', () => navigate(-1));
document.getElementById('btn-next').addEventListener('click', () => navigate(1));
document.getElementById('chk-compare').addEventListener('change', e => {
  state.compare = e.target.checked;
  renderAll();
});
document.getElementById('campaign-filter').addEventListener('change', e => {
  state.campaign = e.target.value;
  renderAll();
});

// ─── Init ───
renderAll();
</script>
</body>
</html>
